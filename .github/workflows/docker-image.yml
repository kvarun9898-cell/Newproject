name: Docker Image CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend
        run: docker build -t backend-image -f backend/Dockerfile backend

      - name: Build Frontend
        run: docker build -t frontend-image -f frontend/Dockerfile frontend
